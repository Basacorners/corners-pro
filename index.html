<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Corners PRO</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<h2>⚽ Corners · Over / Under · Value</h2>

<!-- 🔹 SELECCIÓN -->
<div class="card">
  <h4>SELECCIÓN DE PARTIDO</h4>

  <label>Liga</label>
  <select id="liga" onchange="cargarEquipos()"></select>

  <label>Equipo Local</label>
  <select id="equipoLocal" onchange="cargarLocal()"></select>

  <label>Equipo Visitante</label>
  <select id="equipoVisitante" onchange="cargarVisitante()"></select>
</div>

<!-- 🔹 LOCAL -->
<div class="card">
  <h4>LOCAL</h4>

  <label>Promedio Corners Local</label>
  <input type="number" id="cornersLocal" step="0.01">

  <label>Fuerza (FD Local)</label>
  <input type="number" id="fdLocal" step="0.01">
</div>

<!-- 🔹 VISITANTE -->
<div class="card">
  <h4>VISITANTE</h4>

  <label>Promedio Corners Visitante</label>
  <input type="number" id="cornersVisitante" step="0.01">

  <label>Fuerza (FD Visitante)</label>
  <input type="number" id="fdVisitante" step="0.01">
</div>

<!-- 🔹 CONFIGURACIÓN -->
<div class="card">
  <h4>PARÁMETROS</h4>

  <label>Línea base</label>
  <input type="number" id="linea" step="0.5">

  <button class="calcular" onclick="calcular()">Calcular</button>
  <button class="limpiar" onclick="limpiar()">Limpiar</button>

  <div id="resultado" class="result"></div>
</div>

<!-- 🔹 CUOTAS -->
<div class="card">
  <h4>CUOTAS</h4>

  <label>Cuota OVER</label>
  <input type="number" id="cuotaOver" step="0.01">

  <label>Cuota UNDER</label>
  <input type="number" id="cuotaUnder" step="0.01">
</div>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
